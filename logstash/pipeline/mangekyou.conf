# ─────────────────────────────────────────
#  Mangekyou - Main Logstash Pipeline
# ─────────────────────────────────────────

input {
  # From Filebeat
  beats {
    port => 5044
  }

  # Syslog over UDP
  udp {
    port => 5000
    codec => "plain"
    type => "syslog"
  }

  # Syslog over TCP
  tcp {
    port => 5001
    codec => "plain"
    type => "syslog"
  }
}

filter {
  # Parse syslog messages
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # Add Mangekyou tag to all events
  mutate {
    add_tag => ["mangekyou"]
    add_field => { "siem" => "mangekyou" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${ELASTIC_USERNAME}"
    password => "${ELASTIC_PASSWORD}"
    index => "mangekyou-logs-%{+YYYY.MM.dd}"
  }

  # Debug output - remove in production
  stdout {
    codec => rubydebug
  }
}
