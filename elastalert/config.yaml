# ─────────────────────────────────────────
#  Mangekyou - ElastAlert Configuration
# ─────────────────────────────────────────

es_host: elasticsearch
es_port: 9200
es_username: elastic
es_password: mangekyou_secret

rules_folder: /opt/elastalert/rules
run_every:
  minutes: 1

buffer_time:
  minutes: 15

alert_time_limit:
  days: 2

writeback_index: elastalert_status
